<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Formulaire Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">
                        <i class="bi bi-calendar-check"></i>
                        <span th:if="${rendezVous.id == null}">Nouveau Rendez-vous</span>
                        <span th:if="${rendezVous.id != null}">Modifier Rendez-vous</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/rendezvous/save}" th:object="${rendezVous}" method="post">
                        <!-- ID cache pour modification -->
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="date" class="form-label fw-semibold">Date *</label>
                            <input type="date" class="form-control" id="date"
                                   th:field="*{date}" required>
                        </div>

                        <div class="mb-3">
                            <label for="motif" class="form-label fw-semibold">Motif *</label>
                            <input type="text" class="form-control" id="motif"
                                   th:field="*{motif}" placeholder="Motif du rendez-vous" required>
                            <div th:if="${#fields.hasErrors('motif')}"
                                 class="text-danger small" th:errors="*{motif}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="patient" class="form-label fw-semibold">Patient *</label>
                                <select class="form-select" id="patient" th:field="*{patient.id}" required>
                                    <option value="">-- Selectionner un patient --</option>
                                    <option th:each="p : ${patients}"
                                            th:value="${p.id}"
                                            th:text="${p.prenom + ' ' + p.nom}"></option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="medecin" class="form-label fw-semibold">Medecin *</label>
                                <select class="form-select" id="medecin" th:field="*{medecin.id}" required>
                                    <option value="">-- Selectionner un medecin --</option>
                                    <option th:each="m : ${medecins}"
                                            th:value="${m.id}"
                                            th:text="${m.nom + ' (' + m.specialite + ')'}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="statut" class="form-label fw-semibold">Statut</label>
                            <select class="form-select" id="statut" th:field="*{statut}">
                                <option value="EN_ATTENTE">En Attente</option>
                                <option value="CONFIRME">Confirme</option>
                                <option value="ANNULE">Annule</option>
                                <option value="TERMINE">Termine</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/rendezvous}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
