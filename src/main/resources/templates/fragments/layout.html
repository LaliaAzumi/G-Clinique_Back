<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ==================== NAVBAR ==================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-hospital"></i> ERP Clinique
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        <i class="bi bi-house"></i> Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medecins}">
                        <i class="bi bi-person-badge"></i> Medecins
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patients}">
                        <i class="bi bi-people"></i> Patients
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/rendezvous}">
                        <i class="bi bi-calendar-check"></i> Rendez-vous
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/consultations}">
                        <i class="bi bi-clipboard2-pulse"></i> Consultations
                    </a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Deconnexion
                </button>
            </form>
    </div>
</nav>

<!-- ==================== ALERTS ==================== -->
<div th:fragment="alerts" class="container">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ==================== FOOTER ==================== -->
<footer th:fragment="footer" class="bg-light text-center py-3 mt-5 border-top">
    <div class="container">
        <p class="text-muted mb-0">
            &copy; 2026 ERP Clinique - Systeme de Gestion de Clinique | ESMIA Innovation
        </p>
    </div>
</footer>

</html>
