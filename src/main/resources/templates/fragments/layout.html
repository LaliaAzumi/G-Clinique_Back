<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ==================== NAVBAR ==================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-2">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-hospital"></i> ERP Clinique
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        <i class="bi bi-house"></i> Accueil
                    </a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Deconnexion
                </button>
            </form>
			
    </div>
</nav>

<!-- ==================== ALERTS ==================== -->
<div th:fragment="alerts" class="container">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<div th:fragment="notification-scripts">
<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:99999;"></div>
				 
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
 	 const userId = sessionStorage.getItem('userId');

	 const socket = new SockJS('/ws-notif');
	 const stompClient = Stomp.over(socket);
	
	 stompClient.connect({}, function(frame) {
	    // console.log("WebSocket connecté");
		// console.log("Connecté : " + frame);
		// console.log("User ID :", userId);
	     stompClient.subscribe('/topic/notifications-' + userId, function(message) {
			console.log("MESSAGE RECU :", message.body);
	         showToast(message.body);
	     });
	
	 });

	 function showToast(message) {
	     const container = document.getElementById("toastContainer");
	
	     const toast = document.createElement("div");
	     toast.style.background = "#0d6efd";
	     toast.style.color = "white";
	     toast.style.padding = "15px 20px";
	     toast.style.marginTop = "10px";
	     toast.style.borderRadius = "8px";
	     toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.2)";
	     toast.style.display = "flex";
	     toast.style.justifyContent = "space-between";
	     toast.style.alignItems = "center";
	     toast.style.minWidth = "250px";
	     toast.style.opacity = "0";
	     toast.style.transition = "opacity 0.4s ease";
	
	     const msgSpan = document.createElement("span");
	     msgSpan.innerText = message;
	     toast.appendChild(msgSpan);

	     const closeBtn = document.createElement("button");
	     closeBtn.innerHTML = "&times;";
	     closeBtn.style.background = "transparent";
	     closeBtn.style.border = "none";
	     closeBtn.style.color = "white";
	     closeBtn.style.fontSize = "18px";
	     closeBtn.style.cursor = "pointer";
	     closeBtn.onclick = () => {
	         toast.style.opacity = "0";
	         setTimeout(() => toast.remove(), 400);
	     };
	     toast.appendChild(closeBtn);
	
	     container.appendChild(toast);
	
	     setTimeout(() => {
	         toast.style.opacity = "1";
	     }, 10);
	
	     const audio = new Audio("/sounds/notif.mp3");
	     audio.play();
	 }
 </script>
 </div>

    <div class="container">
        <p class="text-muted mb-0">

        </p>
    </div>
</footer>

</html>
