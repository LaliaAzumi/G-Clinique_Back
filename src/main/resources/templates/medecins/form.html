<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Formulaire Medecin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-person-badge"></i>
                        <span th:if="${medecin.id == null}">Nouveau Medecin</span>
                        <span th:if="${medecin.id != null}">Modifier Medecin</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/medecins/save}" th:object="${medecin}" method="post">
                        <!-- ID cache pour modification -->
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="nom" class="form-label fw-semibold">Nom *</label>
                            <input type="text" class="form-control" id="nom"
                                   th:field="*{nom}" placeholder="Nom du medecin" required>
                            <div th:if="${#fields.hasErrors('nom')}"
                                 class="text-danger small" th:errors="*{nom}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="specialite" class="form-label fw-semibold">Specialite *</label>
                            <input type="text" class="form-control" id="specialite"
                                   th:field="*{specialite}" placeholder="Ex: Cardiologie, Pediatrie..." required>
                            <div th:if="${#fields.hasErrors('specialite')}"
                                 class="text-danger small" th:errors="*{specialite}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="telephone" class="form-label fw-semibold">Telephone</label>
                            <input type="text" class="form-control" id="telephone"
                                   th:field="*{telephone}" placeholder="Numero de telephone">
                        </div>

                        <div class="mb-3">
                            <label for="adresse" class="form-label fw-semibold">Adresse</label>
                            <input type="text" class="form-control" id="adresse"
                                   th:field="*{adresse}" placeholder="Adresse du medecin">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/medecins}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
