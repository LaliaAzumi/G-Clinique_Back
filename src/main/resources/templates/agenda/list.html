<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	    <style>
	        .time-slot {
	            border: 1px solid #dee2e6;
	            height: 50px;
	        }
	        .day-header {
	            text-align: center;
	            font-weight: bold;
	        }
	        .hour-col {
	            width: 60px;
	            text-align: right;
	            padding-right: 5px;
	            font-size: 0.9rem;
	            background-color: #f8f9fa;
	        }
	        .calendar-cell {
	            height: 50px;
	        }
	    </style>
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
	<div class="d-flex justify-content-between mb-3">
		<a th:href="@{/callendar/callendars(startOfWeek=${startOfWeek.minusDays(7)})}" class="btn btn-outline-primary">&lt; Semaine précédente</a>
		<h4 th:text="'Semaine du ' + ${#temporals.format(startOfWeek,'dd/MM/yyyy')} + ' au ' + ${#temporals.format(endOfWeek,'dd/MM/yyyy')}"></h4>
		<a th:href="@{/callendar/callendars(startOfWeek=${startOfWeek.plusDays(7)})}" class="btn btn-outline-primary">Semaine suivante &gt;</a>
	    </div>

		<div class="table-responsive">
		    <table class="table table-bordered">
		        <thead>
		            <tr>
		                <th class="hour-col"></th>
		                <th class="day-header">Lundi</th>
		                <th class="day-header">Mardi</th>
		                <th class="day-header">Mercredi</th>
		                <th class="day-header">Jeudi</th>
		                <th class="day-header">Vendredi</th>
		                <th class="day-header">Samedi</th>
		                <th class="day-header">Dimanche</th>
		            </tr>
		        </thead>
		        <tbody>
		            <!-- Boucle des heures de 8h à 18h -->
		            <tr th:each="hour : ${#numbers.sequence(8,18)}">
		                <td class="hour-col" th:text="${hour} + ':00'"></td>

		                <!-- Boucle des jours, lundi = 1 ... dimanche = 7 -->
		                <td th:each="day : ${#numbers.sequence(1,7)}" class="calendar-cell">
		                    <!-- Vérifie s'il y a un rendez-vous à cette date + heure -->
							<span th:each="rv : ${rendezVousList}" 
							      th:if="${rv.date.dayOfWeek.value == day and rv.heure.hour == hour}"
							      th:text="${rv.patient.nom + ' ' + rv.patient.prenom + ' (' + rv.motif + ')'}"
							      class="badge bg-primary text-white d-block py-1 mb-1"
								  th:classappend="
								            ${rv.statut == 'EN_ATTENTE'} ? ' bg-warning text-dark' :
								            (${rv.statut == 'CONFIRME'} ? ' bg-primary' :
								            (${rv.statut == 'ANNULE'} ? ' bg-danger' :
								            (${rv.statut == 'TERMINE'} ? ' bg-success' : ' bg-secondary')))
								        "
								  data-bs-toggle="modal"
								  th:data-bs-target="'#rendezVousModal-' + ${rv.id}"
								  >
							</span>
		                </td>
		            </tr>
		        </tbody>
		    </table>
		</div>
		<div th:each="rv : ${rendezVousList}">
		    <div class="modal fade" th:id="'rendezVousModal-' + ${rv.id}" tabindex="-1" aria-hidden="true">
		        <div class="modal-dialog">
		            <div class="modal-content">
		                <div class="modal-header bg-warning text-dark">
		                    <h5 class="modal-title">
		                        <i class="bi bi-calendar-check"></i> Détails du Rendez-vous
		                    </h5>
		                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
		                </div>
		                
		                <div class="modal-body">
		                    <form th:action="@{/rendezvous/updateStatus}" th:object="${rv}" method="post">
								<!-- Date editable -->
								<input type="date" class="form-control" name="date"
								       th:value="${rv.date}" 
									   th:min="${#temporals.format(T(java.time.LocalDate).now(),'yyyy-MM-dd')}" 
									   required>

								<!-- Heure editable -->
								<input type="time" class="form-control" name="heure"
								       th:value="${rv.heure}" min="08:00" max="18:00" step="3600" 
									   
									   required>

								<!-- Statut editable -->
								<select class="form-select" name="statut">
								    <option value="EN_ATTENTE" th:selected="${rv.statut=='EN_ATTENTE'}">En Attente</option>
								    <option value="CONFIRME" th:selected="${rv.statut=='CONFIRME'}">Confirmé</option>
								    <option value="ANNULE" th:selected="${rv.statut=='ANNULE'}">Annulé</option>
								    <option value="TERMINE" th:selected="${rv.statut=='TERMINE'}">Terminé</option>
								</select>

								<!-- ID caché -->
								<input type="hidden" name="id" th:value="${rv.id}">
		                        <!-- Lecture seule pour les autres infos -->
		                        <p><strong>Motif :</strong> <span th:text="${rv.motif}"></span></p>
		                        <p><strong>Patient :</strong> <span th:text="${rv.patient.prenom + ' ' + rv.patient.nom}"></span></p>
		                        <p><strong>Médecin :</strong> <span th:text="${rv.medecin.nom + ' (' + rv.medecin.specialite + ')'}"></span></p>

		                        <div class="d-flex justify-content-between mt-3">
		                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
		                            <button type="submit" class="btn btn-warning">Enregistrer</button>
		                        </div>
		                    </form>
		                </div>
		            </div>
		        </div>
		    </div>
		</div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
