<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: notification-scripts}"></div>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
	<div class="container mt-4">
	    <div class="d-flex justify-content-between align-items-center mb-4">
	        <h2 class="fw-bold mb-0">
	            <i class="bi bi-calendar-check text-warning"></i> Liste des Rendez-vous
	        </h2>
	        <a th:href="@{/rendezvous/new}" class="btn btn-warning shadow-sm">
	            <i class="bi bi-plus-circle"></i> Nouveau Rendez-vous
	        </a>
	    </div>

	    <div class="card shadow-sm border-0 mb-4">
	        <div class="card-body p-4">
	            <form th:action="@{/rendezvous}" method="get" class="row g-3">
	                <div class="col-md-4">
	                    <label class="form-label fw-bold small text-muted">Recherche</label>
	                    <div class="input-group">
	                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
	                        <input type="text" name="keyword" th:value="${keyword}" 
	                               class="form-control border-start-0 bg-light" 
	                               placeholder="Patient, médecin ou motif...">
	                    </div>
	                </div>

	                <div class="col-md-3">
	                    <label class="form-label fw-bold small text-muted">Date</label>
	                    <input type="date" name="date" th:value="${date}" class="form-control bg-light">
	                </div>

	                <div class="col-md-3">
	                    <label class="form-label fw-bold small text-muted">Statut</label>
	                    <select name="statut" class="form-select bg-light">
	                        <option value="">Tous les statuts</option>
	                        <option value="EN_ATTENTE" th:selected="${statut == 'EN_ATTENTE'}">En attente</option>
	                        <option value="TERMINE" th:selected="${statut == 'TERMINE'}">Terminé</option>
	                        <option value="ANNULE" th:selected="${statut == 'ANNULE'}">Annulé</option>
	                    </select>
	                </div>

	                <div class="col-md-2 d-flex align-items-end gap-2">
	                    <button type="submit" class="btn btn-primary flex-grow-1">
	                        <i class="bi bi-filter"></i> Filtrer
	                    </button>
	                    <a th:href="@{/rendezvous}" class="btn btn-outline-secondary" title="Réinitialiser">
	                        <i class="bi bi-arrow-clockwise"></i>
	                    </a>
	                </div>
	            </form>
	        </div>
	    </div>
	</div>

    <!-- Tableau -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-warning">
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
						<th>Heure</th>
                        <th>Motif</th>
                        <th>Patient</th>
                        <th>Medecin</th>
                        <th>Statut</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rdv : ${rendezVousList}">
                        <td th:text="${rdv.id}"></td>
                        <td th:text="${rdv.date}"></td>
						<td th:text="${rdv.heure}"></td>
                        <td th:text="${rdv.motif}"></td>
						<td th:text="${rdv.patient?.nom} + ' ' + ${rdv.patient?.prenom} ?: 'Patient Anonyme'"></td>
                        <td th:text="${rdv.medecin.nom}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${rdv.statut == 'EN_ATTENTE'} ? 'bg-secondary' :
                                                  (${rdv.statut == 'CONFIRME'} ? 'bg-primary' :
												(${rdv.statut == 'EN_ATTENTE_REPORTER'} ? 'bg-warning' :
                                                  (${rdv.statut == 'ANNULE'} ? 'bg-danger' : 'bg-success')))"
                                  th:text="${rdv.statut}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/rendezvous/edit/{id}(id=${rdv.id})}"
                               class="btn btn-sm btn-warning me-1" title="Modifier"
							   th:if="${rdv.statut != 'TERMINE'}">
                                <i class="bi bi-pencil"></i> 
                            </a>
                            <a th:href="@{/rendezvous/delete/{id}(id=${rdv.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer ce rendez-vous ?')"
                               title="Supprimer">
                                <i class="bi bi-trash"></i> 
                            </a>
							<form th:action="@{/rendezvous/updateStatus}" method="post" style="display:inline;">
							        <input type="hidden" name="id" th:value="${rdv.id}">
							        <input type="hidden" name="date" th:value="${rdv.date}">
							        <input type="hidden" name="heure" th:value="${rdv.heure}">
							        <input type="hidden" name="statut" value="ANNULE">
							        <button type="submit" class="btn btn-sm btn-outline-danger" 
							                onclick="return confirm('Annuler ce rendez-vous ?')"
											th:if="${rdv.statut == 'EN_ATTENTE' or rdv.statut == 'EN_ATTENTE_REPORTER'}"
											>
							            <i class="bi bi-x-circle"></i> Annuler
							        </button>
							    </form>

								<button type="button" class="btn btn-sm btn-outline-primary" 
								            data-bs-toggle="modal" th:data-bs-target="'#modalReporter' + ${rdv.id}"
											th:if="${rdv.statut == 'EN_ATTENTE' or rdv.statut == 'EN_ATTENTE_REPORTER'}">
								        <i class="bi bi-calendar-event"></i> Reporter
								 </button>
								 <div class="modal fade" th:id="'modalReporter' + ${rdv.id}" tabindex="-1" aria-hidden="true">
								         <div class="modal-dialog">
								             <div class="modal-content">
								                 <div class="modal-header bg-primary text-white">
								                     <h5 class="modal-title">Reporter le rendez-vous</h5>
								                     <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
								                 </div>
								                 <form th:action="@{/rendezvous/updateStatus}" method="post">
								                     <div class="modal-body text-start">
								                         <input type="hidden" name="id" th:value="${rdv.id}">
								                         <input type="hidden" name="statut" th:value="EN_ATTENTE">
								                         
								                         <div class="mb-3">
								                             <label class="form-label">Nouvelle Date</label>
								                             <input type="date" name="date" class="form-control" th:value="${rdv.date}" required>
								                         </div>
								                         <div class="mb-3">
								                             <label class="form-label">Nouvelle Heure</label>
								                             <input type="time" name="heure" class="form-control" th:value="${rdv.heure}" required>
								                         </div>
								                     </div>
								                     <div class="modal-footer">
								                         <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
								                         <button type="submit" class="btn btn-primary">Confirmer le report</button>
								                     </div>
								                 </form>
								             </div>
								         </div>
								     </div>
								
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rendezVousList)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            Aucun rendez-vous enregistre.
                        </td>
                    </tr>
                </tbody>
            </table>
			<nav>
				<ul class="pagination justify-content-center mt-4">
					<li class="page-item" th:if="${currentPage > 0}">
						<a class="page-link"
						   th:href="@{/rendezvous(page=${currentPage-1},keyword=${keyword})}">
						Préc
						</a>
					</li>
					<li class="page-item"
						    th:each="i : ${#numbers.sequence(0,totalPages-1)}"
						    th:classappend="${currentPage==i?'active':''}">
						<a class="page-link"
						   th:href="@{/rendezvous(page=${i},keyword=${keyword})}"
						   th:text="${i+1}">
						</a>
					</li>
					<li class="page-item" th:if="${currentPage < totalPages-1}">
						<a class="page-link"
						   th:href="@{/rendezvous(page=${currentPage+1},keyword=${keyword})}">
						Suiv
						</a>
					</li>
				</ul>
			</nav>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
