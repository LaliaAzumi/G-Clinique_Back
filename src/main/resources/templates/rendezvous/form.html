<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Formulaire Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: notification-scripts}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">
                        <i class="bi bi-calendar-check"></i>
                        <span th:if="${rendezVous.id == null}">Nouveau Rendez-vous</span>
                        <span th:if="${rendezVous.id != null}">Modifier Rendez-vous</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/rendezvous/save}" th:object="${rendezVous}" method="post">
                        <!-- ID cache pour modification -->
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="date" class="form-label fw-semibold">Date *</label>
                            <input type="date" class="form-control" id="date"
                                   th:field="*{date}"
								   th:min="${#temporals.format(T(java.time.LocalDate).now(),'yyyy-MM-dd')}" 
								    required>
                        </div>
						<div class="mb-3">
						         <label for="heure" class="form-label fw-semibold">Heure *</label>
						          <input type="time" class="form-control" id="heure"
						                th:field="*{heure}" required  min="08:00" max="18:00" step="3600" pattern="^([0][8-9]|1[0-8]):00$">
										<div th:if="${#fields.hasErrors('heure')}" 
										         class="text-danger small" th:errors="*{heure}"></div>
						</div>

                        <div class="mb-3">
                            <label for="motif" class="form-label fw-semibold">Motif *</label>
                            <input type="text" class="form-control" id="motif"
                                   th:field="*{motif}" placeholder="Motif du rendez-vous" required>
                            <div th:if="${#fields.hasErrors('motif')}"
                                 class="text-danger small" th:errors="*{motif}"></div>
                        </div>

                        <div class="row">
							<div class="col-md-6 mb-3">
							    <label class="form-label fw-semibold">Patient *</label>

							    <div class="input-group">
							        <select class="form-select" id="patientSelect" th:field="*{patient}" required>
							            <option th:each="p : ${patients}"
							                    th:value="${p.id}"
							                    th:text="${p.prenom + ' ' + p.nom}">
							            </option>
							        </select>

							        <button class="btn btn-outline-secondary" type="button" onclick="toggleSearch('patient')">
							            <i class="bi bi-search"></i>
							        </button>
							    </div>

							    <input type="text" id="patientSearch" class="form-control mt-2 d-none"
							           placeholder="Rechercher un patient...">

							    <div id="patientResults" class="list-group mt-1 d-none"></div>
							</div>

							<div class="col-md-6 mb-3">
							    <label class="form-label fw-semibold">Medecin *</label>

							    <div class="input-group">
							        <select class="form-select" id="medecinSelect" th:field="*{medecin.id}" required>
							            <option th:each="m : ${medecins}"
							                    th:value="${m.id}"
							                    th:text="${m.nom + ' (' + m.specialite + ')'}">
							            </option>
							        </select>

							        <button class="btn btn-outline-secondary" type="button" onclick="toggleSearch('medecin')">
							            <i class="bi bi-search"></i>
							        </button>
							    </div>

							    <input type="text" id="medecinSearch" class="form-control mt-2 d-none"
							           placeholder="Rechercher un medecin...">

							    <div id="medecinResults" class="list-group mt-1 d-none"></div>
							</div>
                        </div>

                         <div class="mb-3" style="display: none;">
                            <label for="statut" class="form-label fw-semibold">Statut</label>
                            <select class="form-select" id="statut" th:field="*{statut}">
                                <option value="EN_ATTENTE">En cours</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/rendezvous}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
	<script>
	function toggleSearch(type) {
	    const select = document.getElementById(type + "Select");
	    const input = document.getElementById(type + "Search");
	    const results = document.getElementById(type + "Results");

	    select.classList.toggle("d-none");
	    input.classList.toggle("d-none");
	    results.classList.add("d-none");
	    input.value = "";
	}

	function setupSearch(type) {
	    const select = document.getElementById(type + "Select");
	    const input = document.getElementById(type + "Search");
	    const results = document.getElementById(type + "Results");

	    input.addEventListener("input", function () {
	        const filter = input.value.toLowerCase();
	        results.innerHTML = "";

	        if (!filter) {
	            results.classList.add("d-none");
	            return;
	        }

	        Array.from(select.options).forEach(option => {
	            if (option.text.toLowerCase().includes(filter)) {
	                const item = document.createElement("a");
	                item.className = "list-group-item list-group-item-action";
	                item.textContent = option.text;

	                item.onclick = function () {
	                    select.value = option.value;
	                    toggleSearch(type);
	                };

	                results.appendChild(item);
	            }
	        });

	        results.classList.remove("d-none");
	    });
	}

	setupSearch("patient");
	setupSearch("medecin");
	</script>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
