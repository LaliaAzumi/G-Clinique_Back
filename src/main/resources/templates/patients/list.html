<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-person-badge text-primary"></i> Liste des patients
        </h2>
        <a th:href="@{/patients/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau patients
        </a>
    </div>

    <!-- Tableau -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prenom</th>
						<th>dateNaissance</th>
                        <th>Telephone</th>
						<th>Email</th>
                        <th>Adresse</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
					<tr th:each="patient : ${patients}">
					    <td th:text="${patient.id}"></td>
					    <td th:text="${patient.nom}"></td>
					    <td th:text="${patient.prenom}"></td>
					    <td th:text="${patient.dateNaissance}"></td>
					    <td th:text="${patient.telephone}"></td>
						<td th:text="${patient.email}"></td>
					    <td th:text="${patient.adresse}"></td>
					    <td class="text-center">
					        <a th:href="@{/patients/edit/{id}(id=${patient.id})}" class="btn btn-sm btn-warning me-1" title="Modifier">
					            <i class="bi bi-pencil"></i> Modifier
					        </a>
					        <a th:href="@{/patients/delete/{id}(id=${patient.id})}" class="btn btn-sm btn-danger"
					           onclick="return confirm('Etes-vous sur de vouloir supprimer ce patient ?')" title="Supprimer">
					            <i class="bi bi-trash"></i> Supprimer
					        </a>
					    </td>
					</tr>
                    <tr th:if="${#lists.isEmpty(patients)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            Aucun patient enregistre.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
