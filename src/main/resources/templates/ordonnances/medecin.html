<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: notification-scripts}"></div>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container my-4">
    <h4><i class="bi bi-file-earmark-medical"></i> Liste des Ordonnances</h4>

    <!-- Recherche par client -->
    <form th:action="@{/ordonnances/Medecin}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="patient" class="form-control" placeholder="Rechercher par patient" th:value="${patient}">
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Rechercher</button>
        </div>
    </form>

    <!-- Liste des ordonnances -->
    <div class="list-group">
        <div th:each="ord : ${ordonnances}" class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <strong th:text="${ord.clientName}"></strong>
				<br>
				 ID: <span th:text="${ord.id}"></span>
				 <br>
				 <strong th:text="${ord.paye} ? 'Déjà payé' : 'Pas encore payé'"></strong>
            </div>
            <div>
                <a th:href="@{'/pdf_ordonnances/ordonnance_' + ${ord.id} + '.pdf'}" target="_blank" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-eye"></i> Voir PDF
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
