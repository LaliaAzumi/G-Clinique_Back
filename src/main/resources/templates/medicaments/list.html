<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: notification-scripts}"></div>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-person-badge text-primary"></i> Liste des medicaments
        </h2>
		<form th:action="@{/medicaments}" method="get" class="mb-4 d-flex">

		    <input type="text" name="keyword" th:value="${keyword}"
		           class="form-control me-2"
		           placeholder="Rechercher un medicament">

		    <button class="btn btn-primary">
		        <i class="bi bi-search"></i>
		    </button>

		</form>
        <a th:href="@{/medicaments/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau medicament
        </a>
    </div>

    <!-- Tableau -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>description</th>
						<th>prix unitaire</th>
						<th>stocks</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="medicament : ${medicaments}">
                        <td th:text="${medicament.id}"></td>
                        <td th:text="${medicament.nom}"></td>
                        <td th:text="${medicament.description}"></td>
						<td th:text="${medicament.pu}"></td>
						<td th:text="${medicament.qStock}"></td>
                        <td class="text-center">
                            <a th:href="@{/medicaments/edit/{id}(id=${medicament.id})}"
                               class="btn btn-sm btn-warning me-1" title="Modifier">
                                <i class="bi bi-pencil"></i> Modifier
                            </a>
                            <a th:href="@{/medicaments/delete/{id}(id=${medicament.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer ce medicament ?')"
                               title="Supprimer">
                                <i class="bi bi-trash"></i> Supprimer
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(medicaments)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            Aucun medicament enregistre.
                        </td>
                    </tr>
                </tbody>
            </table>
			<nav>
			<ul class="pagination justify-content-center mt-4">

			<li class="page-item" th:if="${currentPage > 0}">
			<a class="page-link"
			   th:href="@{/medicaments(page=${currentPage-1},keyword=${keyword})}">
			Préc
			</a>
			</li>

			<li class="page-item"
			    th:each="i : ${#numbers.sequence(0,totalPages-1)}"
			    th:classappend="${currentPage==i?'active':''}">
			<a class="page-link"
			   th:href="@{/medicaments(page=${i},keyword=${keyword})}"
			   th:text="${i+1}">
			</a>
			</li>

			<li class="page-item" th:if="${currentPage < totalPages-1}">
			<a class="page-link"
			   th:href="@{/medicaments(page=${currentPage+1},keyword=${keyword})}">
			Suiv
			</a>
			</li>

			</ul>
			</nav>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
