<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Formulaire Medicament</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: notification-scripts}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-person-badge"></i>
                        <span th:if="${medicament.id == null}">Nouveau Medicament</span>
                        <span th:if="${medicament.id != null}">Modifier Medicament</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/medicaments/save}" th:object="${medicament}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <div class="mb-3">
                            <label for="nom" class="form-label fw-semibold">Nom *</label>
                            <input type="text" class="form-control" id="nom"
                                   th:field="*{nom}" placeholder="Nom du medicament" required>
                            <div th:if="${#fields.hasErrors('nom')}"
                                 class="text-danger small" th:errors="*{nom}"></div>
                        </div>
						<div class="mb-3">
						     <label for="nom" class="form-label fw-semibold">Description *</label>
						     <input type="text" class="form-control" id="description"
						            th:field="*{description}" placeholder="description du medicament" required>
						     <div th:if="${#fields.hasErrors('description')}"
						          class="text-danger small" th:errors="*{description}"></div>
						</div>
						<div class="mb-3">
							<label for="pu" class="form-label fw-semibold">Prix Unitaire *</label>
							<input type="number" class="form-control" id="description"
									th:field="*{pu}" placeholder="Prix Unitaire du medicament" required>
							<div th:if="${#fields.hasErrors('pu')}"
								class="text-danger small" th:errors="*{pu}"></div>
						</div>
						
						<div class="mb-3">
							<label for="qStock" class="form-label fw-semibold">Stock *</label>
							<input type="number" class="form-control" id="qStock"
								th:field="*{qStock}" placeholder=" Quantité en Stock" required>
							<div th:if="${#fields.hasErrors('qStock')}"
								class="text-danger small" th:errors="*{qStock}"></div>
						</div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/medicaments}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
