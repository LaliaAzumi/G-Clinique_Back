<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Formulaire Consultation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-clipboard2-pulse"></i>
                        <span th:if="${consultation.id == null}">Nouvelle Consultation</span>
                        <span th:if="${consultation.id != null}">Modifier Consultation</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/consultations/save}" th:object="${consultation}" method="post">
                        <!-- ID cache pour modification -->
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="date" class="form-label fw-semibold">Date *</label>
                            <input type="date" class="form-control" id="date"
                                   th:field="*{date}" required>
                        </div>

                        <div class="mb-3">
                            <label for="diagnostique" class="form-label fw-semibold">Diagnostique *</label>
                            <textarea class="form-control" id="diagnostique" rows="4"
                                      th:field="*{diagnostique}"
                                      placeholder="Saisir le diagnostique..." required></textarea>
                            <div th:if="${#fields.hasErrors('diagnostique')}"
                                 class="text-danger small" th:errors="*{diagnostique}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="rendezVous" class="form-label fw-semibold">Rendez-vous *</label>
                            <select class="form-select" id="rendezVous" th:field="*{rendezVous.id}" required>
                                <option value="">-- Selectionner un rendez-vous --</option>
                                <option th:each="rdv : ${rendezVousList}"
                                        th:value="${rdv.id}"
                                        th:text="${rdv.date + ' - ' + rdv.motif + ' (' + rdv.patient.nom + ')'}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/consultations}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Retour
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-check-circle"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
