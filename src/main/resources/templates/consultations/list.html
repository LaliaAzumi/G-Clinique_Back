<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Clinique - Consultations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Alerts -->
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-clipboard2-pulse text-danger"></i> Liste des Consultations
        </h2>
		<form th:action="@{/consultations}" method="get" class="mb-4 d-flex">
			 	<input type="text" name="keyword" th:value="${keyword}"
				  class="form-control me-2"
				  placeholder="Rechercher un consultations">
				  <!-- Champ recherche par date -->
				  <input type="date" name="date" th:value="${date}" 
				             class="form-control me-2" placeholder="Date">

				<button class="btn btn-primary">
				   <i class="bi bi-search"></i>
				</button>
		</form>
		<!-- 
        <a th:href="@{/consultations/new}" class="btn btn-danger">
            <i class="bi bi-plus-circle"></i> Nouvelle Consultation
        </a> -->
    </div>

    <!-- Tableau -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-danger">
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Diagnostique</th>
                        <th>Rendez-vous (Motif)</th>
                        <th>Patient</th>
                       
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="consultation : ${consultations}">
                        <td th:text="${consultation.id}"></td>
                        <td th:text="${consultation.date}"></td>
                        <td th:text="${consultation.diagnostique}"></td>
                        <td th:text="${consultation.rendezVous.motif}"></td>
                        <td th:text="${consultation.rendezVous.patient.nom + ' ' + consultation.rendezVous.patient.prenom}"></td>
                       
                        <td class="text-center">
                            <a th:href="@{/consultations/edit/{id}(id=${consultation.id})}"
                               class="btn btn-sm btn-warning me-1" title="Modifier">
                                <i class="bi bi-pencil"></i> 
                            </a>
                            <a th:href="@{/consultations/delete/{id}(id=${consultation.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Etes-vous sur de vouloir supprimer cette consultation ?')"
                               title="Supprimer">
                                <i class="bi bi-trash"></i> 
                            </a>
							    <button type="button" class="btn btn-sm btn-info text-white me-1" 
							            data-bs-toggle="modal" 
							            th:data-bs-target="'#detailModal' + ${consultation.id}" title="Détails">
							        <i class="bi bi-eye"></i>
							    </button>
							    
                        </td>
						<div class="modal fade" th:id="'detailModal' + ${consultation.id}" tabindex="-1" aria-hidden="true">
						    <div class="modal-dialog modal-lg">
						        <div class="modal-content">
						            <div class="modal-header bg-info text-white">
						                <h5 class="modal-title">
						                    <i class="bi bi-info-circle"></i> Détails de la Consultation <span th:text="${consultation.rendezVous.patient.nom + ' ' + consultation.rendezVous.patient.prenom}"></span>
						                </h5>
						                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
						            </div>
						            <div class="modal-body text-start">
						                <div class="row">
						                    <div class="col-md-6">
						                        <p><strong><i class="bi bi-calendar-event"></i> Date :</strong> <span th:text="${#temporals.format(consultation.date, 'dd/MM/yyyy')}"></span></p>
						                        <p><strong><i class="bi bi-person-circle"></i> Patient :</strong> <span th:text="${consultation.rendezVous.patient.nom + ' ' + consultation.rendezVous.patient.prenom}"></span></p>
						                        <p><strong><i class="bi bi-person-badge"></i> Médecin :</strong> <span th:text="${consultation.rendezVous.medecin.nom}"></span></p>
						                    </div>
						                    <div class="col-md-6">
						                        <p><strong><i class="bi bi-card-text"></i> Motif RDV :</strong> <span th:text="${consultation.rendezVous.motif}"></span></p>
						                       
						                    </div>
						                </div>
						                <hr>
						                <div class="mt-3">
						                    <h6 class="fw-bold"><i class="bi bi-file-earmark-medical"></i> Diagnostique :</h6>
						                    <div class="p-3 bg-light border rounded">
						                        <p class="mb-0" th:text="${consultation.diagnostique}"></p>
						                    </div>
						                </div>
						                </div>
						            <div class="modal-footer">
						                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
						            </div>
						        </div>
						    </div>
						</div>
                    </tr>
                    <tr th:if="${#lists.isEmpty(consultations)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            Aucune consultation enregistree.
                        </td>
                    </tr>
                </tbody>
            </table>
			<nav>
						<ul class="pagination justify-content-center mt-4">

						<li class="page-item" th:if="${currentPage > 0}">
						<a class="page-link"
						   th:href="@{/consultations(page=${currentPage-1},keyword=${keyword})}">
						Préc
						</a>
						</li>

						<li class="page-item"
						    th:each="i : ${#numbers.sequence(0,totalPages-1)}"
						    th:classappend="${currentPage==i?'active':''}">
						<a class="page-link"
						   th:href="@{/consultations(page=${i},keyword=${keyword})}"
						   th:text="${i+1}">
						</a>
						</li>

						<li class="page-item" th:if="${currentPage < totalPages-1}">
						<a class="page-link"
						   th:href="@{/consultations(page=${currentPage+1},keyword=${keyword})}">
						Suiv
						</a>
						</li>

						</ul>
						</nav>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
